# 外部服务（开发环境）：PostgreSQL (含 pgvector) + MinIO
# 启动：docker compose -f docker-compose.infra.yml up -d

services:
  postgres:
    # Pinned: Postgres 16 with pgvector extension (vector embeddings store).
    image: pgvector/pgvector:pg16
    container_name: colony-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: colony
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d colony"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Pinned: MinIO stable dated release (S3-compatible object store).
    # NOTE: maintainer should confirm/refresh this tag against minio/minio releases.
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: colony-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 初始化 MinIO bucket
  minio-init:
    # Pinned: MinIO client (mc) dated release; keep in sync with minio above.
    # NOTE: maintainer should confirm/refresh this tag against minio/mc releases.
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: colony-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/colony &&
      echo '✅ bucket colony 已就绪'
      "

volumes:
  pg-data:
  minio-data:
