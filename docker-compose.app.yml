# Colony — app only (backend + frontend). No bundled Postgres/MinIO.
#
#   docker compose -f docker-compose.app.yml up -d
#
# Use this when you already run a managed Postgres (with pgvector) and an S3-compatible
# object store. Point at them through backend/.env — DATABASE_URL, S3_ENDPOINT_URL,
# S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY / S3_BUCKET_NAME, plus SECRET_KEY / ENCRYPTION_KEY.
# Nothing is overridden here, so .env is the single source of truth for connections.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colony-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "9022:9022"
    # --no-sync: run in the image's already-built frozen env; never hit PyPI at boot.
    command: >
      sh -c "uv run --no-sync alembic upgrade head &&
             uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 9022"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the standalone /api-proxy rewrite at build time (see frontend/Dockerfile).
        BACKEND_URL: http://backend:9022
    container_name: colony-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:9022
      NEXT_PUBLIC_STREAM_BASE_URL: ""
    ports:
      - "3022:3022"
    depends_on:
      - backend
